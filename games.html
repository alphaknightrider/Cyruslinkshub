<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyrusLinksHub - Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
:root{
    --neon-red:#ff003c;
    --neon-cyan:#00f7ff;
    --bg-dark:#05010a;
    --card-bg:rgba(10,5,20,.75);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg-dark);
    color:#fff;
    overflow-x:hidden;
    font-family:'Orbitron',sans-serif;
}

canvas{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
}

h1,h2,h3{
    letter-spacing:2px;
}

p{
    font-family:'Rajdhani',sans-serif;
    color:#ccc;
    line-height:1.7;
}

/* HEADER */
header{
    text-align:center;
    padding:20px;
    border-bottom:2px solid var(--neon-red);
    background:rgba(5,1,10,.95);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,0,60,.4);
}

.title-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    position:relative;
    max-width:700px;
    margin:auto;
}

.title-link{
    text-decoration:none;
    color:inherit;
    display:flex;
    align-items:center;
    gap:15px;
}

.logo-container{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid var(--neon-cyan);
    box-shadow:0 0 12px var(--neon-cyan);
    animation:rotateLogo 8s linear infinite;
}

.logo-tick{
    width:22px;
    height:22px;
    fill:none;
    stroke:var(--neon-cyan);
    stroke-width:4;
    stroke-linecap:round;
    stroke-linejoin:round;
}

@keyframes rotateLogo{
    from{
        transform:rotate(0deg);
    }
    to{
        transform:rotate(360deg);
    }
}

header h1{
    color:var(--neon-red);
    text-shadow:0 0 15px var(--neon-red);
}

.settings-btn{
    position:absolute;
    right:0;
    width:36px;
    height:36px;
    border:1px solid var(--neon-cyan);
    background:transparent;
    color:var(--neon-cyan);
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

.settings-btn:hover{
    background:var(--neon-cyan);
    color:#000;
    transform:rotate(45deg);
}

/* HERO */
.hero{
    text-align:center;
    padding:70px 20px;
    background:
    radial-gradient(
        circle,
        rgba(255,0,60,.12) 0%,
        transparent 70%
    );
}

.hero h2{
    color:var(--neon-red);
    font-size:2.4rem;
    text-shadow:0 0 20px rgba(255,0,60,.7);
}

.hero p{
    margin-top:15px;
    font-size:1.2rem;
}

/* SECTIONS */
section{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.section-title{
    color:var(--neon-cyan);
    margin-bottom:20px;
    text-transform:uppercase;
    text-shadow:0 0 10px rgba(0,247,255,.5);
}

.desc{
    margin-bottom:35px;
    max-width:850px;
}

/* GAME GRID */
.games-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(280px,1fr));
    gap:25px;
}

.game-card{
    background:var(--card-bg);
    border:1px solid var(--neon-cyan);
    border-radius:10px;
    overflow:hidden;
    transition:.35s;
}

.game-card:hover{
    transform:translateY(-5px);
    border-color:var(--neon-red);
    box-shadow:0 8px 25px rgba(255,0,60,.35);
}

.game-image{
    width:100%;
    height:180px;
    object-fit:cover;
    background:#111;
}

.game-content{
    padding:20px;
}

.game-title{
    font-size:1.2rem;
    margin-bottom:10px;
}

.game-desc{
    margin-bottom:20px;
}

.btn{
    display:block;
    width:100%;
    text-align:center;
    padding:12px;
    text-decoration:none;
    border:1px solid var(--neon-red);
    color:var(--neon-red);
    border-radius:5px;
    transition:.3s;
}

.btn:hover{
    background:var(--neon-red);
    color:#000;
    box-shadow:0 0 15px var(--neon-red);
}
