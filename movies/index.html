<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>CyrusLinksHub - Movies Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
    --neon-red:#ff003c;
    --neon-cyan:#00f7ff;
    --bg-dark:#05010a;
    --card-bg:rgba(10,5,20,0.75);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg-dark);
    color:#fff;
    font-family:'Orbitron',sans-serif;
    overflow-x:hidden;
}

/* PARTICLES */

#particles{
    position:fixed;
    inset:0;
    z-index:-1;
}

/* HEADER */

header{
    text-align:center;
    padding:20px;
    background:rgba(5,1,10,.95);
    border-bottom:2px solid var(--neon-red);
    box-shadow:0 0 20px rgba(255,0,60,.4);
}

.title-row{
    display:flex;
    align-items:center;
    justify-content:center;
    gap:15px;
    position:relative;
}

.logo-container{
    width:45px;
    height:45px;
    border-radius:50%;
    border:2px solid var(--neon-cyan);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 15px var(--neon-cyan);
    animation:rotateLogo 8s linear infinite;
}

@keyframes rotateLogo{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.logo-tick{
    width:24px;
    height:24px;
    fill:none;
    stroke:var(--neon-cyan);
    stroke-width:4;
    stroke-linecap:round;
    stroke-linejoin:round;
}

header h1{
    color:var(--neon-red);
    text-shadow:0 0 15px var(--neon-red);
}

/* SETTINGS */

.settings-btn{
    position:absolute;
    right:10px;
    width:40px;
    height:40px;
    border:1px solid var(--neon-cyan);
    background:transparent;
    color:var(--neon-cyan);
    cursor:pointer;
    border-radius:5px;
    transition:.3s;
}

.settings-btn:hover{
    background:var(--neon-cyan);
    color:#000;
    transform:rotate(45deg);
}

/* HERO */

.hero{
    text-align:center;
    padding:80px 20px;
}

.hero h2{
    color:var(--neon-red);
    font-size:2.5rem;
    text-shadow:0 0 20px var(--neon-red);
}

.hero p{
    margin-top:15px;
    color:#ccc;
    font-family:'Rajdhani',sans-serif;
    font-size:1.2rem;
}

/* SETTINGS MODAL */

.modal-overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.85);
    z-index:9999;
}

.modal-content{
    width:90%;
    max-width:400px;
    background:#0d0614;
    border:2px solid var(--neon-cyan);
    border-radius:10px;
    padding:25px;
    box-shadow:0 0 25px rgba(0,247,255,.5);
}

.modal-content h3{
    margin-bottom:20px;
    color:var(--neon-cyan);
}

.setting-row{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.close-btn{
    margin-top:20px;
    width:100%;
    padding:12px;
    border:none;
    background:var(--neon-red);
    color:#000;
    cursor:pointer;
    border-radius:5px;
}

/* SECTION */

section{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.section-title{
    color:var(--neon-cyan);
    margin-bottom:20px;
}

.games-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:var(--card-bg);
    border:1px solid var(--neon-cyan);
    border-radius:10px;
    overflow:hidden;
    transition:.3s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:var(--neon-red);
    box-shadow:0 0 20px rgba(255,0,60,.4);
}

.card-content{
    padding:30px;
    text-align:center;
}

.card-title{
    font-size:1.2rem;
    margin-bottom:20px;
}

.btn{
    display:block;
    text-decoration:none;
    padding:12px;
    border:1px solid var(--neon-red);
    color:var(--neon-red);
    border-radius:5px;
    transition:.3s;
}

.btn:hover{
    background:var(--neon-red);
    color:#000;
}

</style>

</head>

<body>

<canvas id="particles"></canvas>

<div class="modal-overlay" id="settingsModal">

<div class="modal-content">

<h3>System Settings</h3>

<div class="setting-row">
<span>Particles</span>
<input type="checkbox" checked>
</div>

<div class="setting-row">
<span>Performance Mode</span>
<input type="checkbox">
</div>

<button class="close-btn"
onclick="closeSettings()">
Close
</button>

</div>

</div>

<header>

<div class="title-row">

<div class="logo-container">

<svg class="logo-tick"
viewBox="0 0 24 24">

<path d="M20 6L9 17L4 12"/>

</svg>

</div>

<h1>CyrusLinksHub</h1>

<button class="settings-btn"
onclick="openSettings()">

⚙

</button>

</div>

</header>

<div class="hero">

<h2>
WELCOME TO CYRUSLINKSHUB MOVIES HUB
</h2>

<p>
Hollywood Movies • Bollywood Movies
</p>

</div>
<!-- ================= MOVIES ================= -->

<section id="movies">

<h2 class="section-title">
Movies Hub
</h2>

<div class="games-grid">

<div class="card">
<div class="card-content">

<div class="card-title">
Hollywood Movies
</div>

<a href="#" class="btn">
Visit
</a>

</div>
</div>

<div class="card">
<div class="card-content">

<div class="card-title">
Bollywood Movies
</div>

<a href="#" class="btn">
Visit
</a>

</div>
</div>

</div>

</section>

<!-- ================= HOME ================= -->

<section id="navigation">

<h2 class="section-title">
Navigation
</h2>

<div class="card">

<div class="card-content">

<div class="card-title">
Back To Home
</div>

<a href="/" class="btn">
Home
</a>

</div>

</div>

</section>

<!-- ================= FOOTER ================= -->

<footer style="
text-align:center;
padding:30px;
margin-top:40px;
border-top:1px solid rgba(255,0,60,.3);
color:#888;
">

© 2026 CyrusLinksHub • Movies Hub

</footer>

<!-- ================= TOP BUTTON ================= -->

<button id="topBtn"
style="
position:fixed;
right:20px;
bottom:20px;
width:45px;
height:45px;
border:none;
border-radius:5px;
cursor:pointer;
display:none;
background:#00f7ff;
color:#000;
font-size:18px;
font-weight:bold;
z-index:999;
">

↑

</button>

<script>

/* SETTINGS */

function openSettings(){

document.getElementById(
"settingsModal"
).style.display="flex";

}

function closeSettings(){

document.getElementById(
"settingsModal"
).style.display="none";

}

/* TOP BUTTON */

const topBtn =
document.getElementById("topBtn");

window.addEventListener(
"scroll",
()=>{

topBtn.style.display =
window.scrollY > 300
? "block"
: "none";

}
);

topBtn.onclick=()=>{

window.scrollTo({
top:0,
behavior:"smooth"
});

};

/* PARTICLES */

const canvas =
document.getElementById(
"particles"
);

const ctx =
canvas.getContext("2d");

let w,h;

function resize(){

w=canvas.width=
window.innerWidth;

h=canvas.height=
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);

const particles=[];

for(let i=0;i<60;i++){

particles.push({

x:Math.random()*w,
y:Math.random()*h,

vx:(Math.random()-0.5)*0.6,
vy:(Math.random()-0.5)*0.6,

size:Math.random()*3+1,

color:
Math.random()>0.5
? "#00f7ff"
: "#ff003c"

});

}

function animate(){

ctx.clearRect(0,0,w,h);

particles.forEach(p=>{

p.x+=p.vx;
p.y+=p.vy;

if(p.x<0)p.x=w;
if(p.x>w)p.x=0;

if(p.y<0)p.y=h;
if(p.y>h)p.y=0;

ctx.beginPath();

ctx.fillStyle=p.color;

ctx.arc(
p.x,
p.y,
p.size,
0,
Math.PI*2
);

ctx.fill();

});

requestAnimationFrame(
animate
);

}

animate();

</script>

</body>
</html>
