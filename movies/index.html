<style>

:root{
    --bg:#05010a;
    --cyan:#00f7ff;
    --red:#ff003c;
    --card:#0d0818;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg);
    color:white;
    font-family:'Orbitron',sans-serif;
    overflow-x:hidden;
}

#particles{
    position:fixed;
    inset:0;
    z-index:-1;
}

header{
    position:sticky;
    top:0;
    z-index:100;
    background:rgba(0,0,0,.7);
    backdrop-filter:blur(10px);
    border-bottom:2px solid var(--red);
    padding:18px;
}

.header-container{
    max-width:1200px;
    margin:auto;
    display:flex;
    align-items:center;
    justify-content:space-between;
}

.logo-area{
    display:flex;
    align-items:center;
    gap:15px;
}

.logo{
    width:48px;
    height:48px;
    border-radius:50%;
    border:2px solid var(--cyan);
    display:flex;
    justify-content:center;
    align-items:center;
    box-shadow:0 0 15px var(--cyan);
    animation:spin 10s linear infinite;
}

.logo svg{
    width:22px;
    height:22px;
    stroke:var(--cyan);
    fill:none;
    stroke-width:3;
}

@keyframes spin{
    from{transform:rotate(0deg);}
    to{transform:rotate(360deg);}
}

.site-title{
    color:var(--red);
    font-size:1.8rem;
    text-shadow:0 0 15px var(--red);
}

.settings-btn{
    width:45px;
    height:45px;
    border-radius:50%;
    border:1px solid var(--cyan);
    background:transparent;
    color:var(--cyan);
    cursor:pointer;
    font-size:20px;
}

.hero{
    text-align:center;
    padding:90px 20px;
}

.hero h1{
    color:var(--red);
    font-size:3rem;
    text-shadow:0 0 20px var(--red);
}

.hero p{
    margin-top:15px;
    color:#ccc;
    font-family:'Rajdhani',sans-serif;
    font-size:1.2rem;
}

/* SETTINGS MODAL */

.modal{
    position:fixed;
    inset:0;
    background:rgba(0,0,0,.85);
    display:none;
    justify-content:center;
    align-items:center;
    z-index:9999;
}

.modal-content{
    width:90%;
    max-width:420px;
    background:#12081f;
    border:2px solid var(--cyan);
    border-radius:12px;
    padding:25px;
}

.modal-content h2{
    color:var(--cyan);
    margin-bottom:20px;
}

.setting-item{
    display:flex;
    justify-content:space-between;
    margin:15px 0;
}

.close-btn{
    width:100%;
    margin-top:20px;
    padding:12px;
    border:none;
    border-radius:6px;
    background:var(--red);
    color:black;
    cursor:pointer;
}

</style>
</head>

<body id="top">

<div class="setting-item">

Close

</div>
</div>

<header>

<div class="header-container">

<div class="site-title">
CyrusLinksHub

</div>

<button class="settings-btn" onclick="openSettings()">
⚙

</div>

<div class="hero">

<h1>
WELCOME TO CYRUSLINKSHUB MOVIES HUB
</h1>

<p>
Hollywood Movies • Bollywood Movies

<style>

.container{
max-width:1200px;
margin:auto;
padding:30px 20px;
}

.section-title{
color:var(--cyan);
font-size:1.6rem;
margin-bottom:25px;

}

.movies-grid{
display:grid;
grid-template-columns:

}

.movie-card{

.visit-btn{

}

.visit-btn:hover{

}

.faq-item{
background:var(--card);
padding:20px;
margin-bottom:15px;
border-left:3px solid var(--cyan);

}

.faq-item h3{

}

footer{

padding:30px;

color:#888;
}

#topBtn{

</style>

<!-- MOVIES -->

<h2 class="section-title">

<div class="movies-grid">

</div>

↑

</button>
<script>

/* ================= SETTINGS ================= */

const settingsModal =
document.getElementById(
"settingsModal"
);

function openSettings(){

settingsModal.style.display =
"flex";

}

function closeSettings(){

settingsModal.style.display =
"none";

}

settingsModal.addEventListener(
"click",
function(e){

if(
e.target === settingsModal
){

closeSettings();

}

}
);

/* ================= TOP BUTTON ================= */

const topBtn =
document.getElementById(
"topBtn"
);

window.addEventListener(
"scroll",
()=>{

if(
window.scrollY > 250
){

topBtn.style.display =
"block";

}else{

topBtn.style.display =
"none";

}

}
);

topBtn.addEventListener(
"click",
()=>{

window.scrollTo({

top:0,
behavior:"smooth"

});

}
);

/* ================= PARTICLES ================= */

const canvas =
document.getElementById(
"particles"
);

const ctx =
canvas.getContext(
"2d"
);

let width;
let height;

function resizeCanvas(){

width =
canvas.width =
window.innerWidth;

height =
canvas.height =
window.innerHeight;

}

resizeCanvas();

window.addEventListener(
"resize",
resizeCanvas
);

/* ================= OPTIONS ================= */

let particlesEnabled =
true;

let performanceMode =
false;

let particles = [];

/* ================= PARTICLE CLASS ================= */

class Particle{

constructor(
x,
y,
ambient=false
){

this.x = x;
this.y = y;

this.ambient =
ambient;

this.size =
ambient
? Math.random()*2+1
: Math.random()*2+0.5;

this.color =
Math.random() > 0.5
? "#00f7ff"
: "#ff003c";

if(ambient){

this.vx =
Math.random()*0.4-0.2;

this.vy =
Math.random()*0.4-0.2;

}else{

this.vx =
Math.random()*2-1;

this.vy =
Math.random()*2-1;

}

}

update(){

this.x += this.vx;
this.y += this.vy;

if(this.ambient){

if(this.x < 0)
this.x = width;

if(this.x > width)
this.x = 0;

if(this.y < 0)
this.y = height;

if(this.y > height)
this.y = 0;

}else{

this.size -= 0.05;

}

}

draw(){

ctx.beginPath();

ctx.fillStyle =
this.color;

ctx.arc(
this.x,
this.y,
this.size,
0,
Math.PI*2
);

ctx.fill();

}

}

/* ================= CREATE PARTICLES ================= */

function createAmbientParticles(){

particles = [];

if(!particlesEnabled)
return;

const count =
performanceMode
? 15
: 30;

for(
let i=0;
i<count;
i++
){

particles.push(

new Particle(

Math.random()*width,
Math.random()*height,
true

)

);

}

}

createAmbientParticles();

/* ================= TOUCH EFFECT ================= */

function spawnBurst(x,y){

if(
performanceMode ||
!particlesEnabled
){
return;
}

for(
let i=0;
i<2;
i++
){

particles.push(

new Particle(
x,
y,
false
)

);

}

}

window.addEventListener(
"mousemove",
e=>{

spawnBurst(
e.clientX,
e.clientY
);

}
);

window.addEventListener(
"touchmove",
e=>{

const touch =
e.touches[0];

spawnBurst(
touch.clientX,
touch.clientY
);

},
{passive:true}
);

/* ================= ANIMATION ================= */

function animate(){

ctx.clearRect(
0,
0,
width,
height
);

for(
let i=particles.length-1;
i>=0;
i--
){

const p =
particles[i];

p.update();
p.draw();

if(
!p.ambient &&
p.size <= 0.2
){

particles.splice(
i,
1
);

}

}

requestAnimationFrame(
animate
);

}

animate();

/* ================= SETTINGS TOGGLES ================= */

document
.getElementById(
"particleToggle"
)
.addEventListener(
"change",
function(){

particlesEnabled =
this.checked;

createAmbientParticles();

}
);

document
.getElementById(
"performanceToggle"
)
.addEventListener(
"change",
function(){

performanceMode =
this.checked;

createAmbientParticles();

}
);

</script>

</body>
