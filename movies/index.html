<!DOCTYPE html>
<html lang="en">

<head>

<meta charset="UTF-8">
<meta name="viewport"
content="width=device-width, initial-scale=1.0">

<title>CyrusLinksHub Movies</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>

:root{
--bg:#05010a;
--cyan:#00f7ff;
--red:#ff003c;
--card:rgba(10,5,20,.75);
}

*{
margin:0;
padding:0;
box-sizing:border-box;
}

html{
scroll-behavior:smooth;
}

body{
background:var(--bg);
color:white;
font-family:'Orbitron',sans-serif;
overflow-x:hidden;
}

canvas{
position:fixed;
inset:0;
z-index:-1;
}

/* HEADER */

header{
padding:20px;
text-align:center;
background:rgba(0,0,0,.4);
backdrop-filter:blur(10px);
border-bottom:2px solid var(--red);
box-shadow:0 0 20px rgba(255,0,60,.3);
}

.logo-wrap{
display:flex;
justify-content:center;
align-items:center;
gap:15px;
}

.logo{
width:50px;
height:50px;
border-radius:50%;
border:2px solid var(--cyan);
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 15px var(--cyan);
animation:spin 8s linear infinite;
}

@keyframes spin{
from{transform:rotate(0deg);}
to{transform:rotate(360deg);}
}

.logo svg{
width:25px;
height:25px;
stroke:var(--cyan);
fill:none;
stroke-width:3;
}

h1{
color:var(--red);
text-shadow:0 0 15px var(--red);
}

/* SETTINGS */

.settings-area{
margin-top:15px;
}

.settings-btn{
padding:10px 20px;
background:transparent;
border:1px solid var(--cyan);
color:var(--cyan);
cursor:pointer;
border-radius:6px;
transition:.3s;
}

.settings-btn:hover{
background:var(--cyan);
color:black;
}

/* HERO */

.hero{
padding:80px 20px;
text-align:center;
}

.hero h2{
font-size:2.3rem;
color:var(--red);
text-shadow:0 0 20px var(--red);
}

.hero p{
margin-top:15px;
font-family:'Rajdhani',sans-serif;
font-size:1.2rem;
color:#bbb;
}

/* SECTION */

section{
max-width:1200px;
margin:auto;
padding:40px 20px;
}

.section-title{
color:var(--cyan);
margin-bottom:20px;
font-size:1.6rem;
text-transform:uppercase;
}

.grid{
display:grid;
grid-template-columns:
repeat(auto-fit,minmax(280px,1fr));
gap:25px;
}

.card{
background:var(--card);
border:1px solid var(--cyan);
border-radius:10px;
overflow:hidden;
transition:.3s;
}

.card:hover{
transform:translateY(-5px);
border-color:var(--red);
box-shadow:0 0 20px rgba(255,0,60,.4);
}

.card-content{
padding:30px;
text-align:center;
}

.card-title{
font-size:1.2rem;
margin-bottom:20px;
}

.btn{
display:block;
padding:12px;
text-decoration:none;
border:1px solid var(--red);
color:var(--red);
border-radius:5px;
transition:.3s;
}

.btn:hover{
background:var(--red);
color:black;
}

/* MODAL */

.modal{
position:fixed;
inset:0;
display:none;
justify-content:center;
align-items:center;
background:rgba(0,0,0,.85);
z-index:9999;
}

.modal-box{
width:90%;
max-width:420px;
padding:25px;
border-radius:10px;
background:#0d0614;
border:2px solid var(--cyan);
}

.modal-box h3{
color:var(--cyan);
margin-bottom:20px;
}

</style>

</head>

<body>

onclick="closeSettings()"

Close

</div>

</div>

<header>

<div class="logo-wrap">

<div class="logo">

<svg viewBox="0 0 24 24">

<path d="M20 6L9 17L4 12"/>

</svg>

<div class="settings-area">

<div class="hero">

<h2>
WELCOME TO CYRUSLINKSHUB MOVIES HUB
</h2>

<p>
Hollywood Movies • Bollywood Movies
</p>

</div>

</h2>

<div class="card">

<!-- ================= FLOATING MENU ================= -->

<button id="menuBtn">

☰

</button>

<style>

#menuBtn{

position:fixed;
left:20px;
bottom:100px;

width:55px;
height:55px;

border:none;
border-radius:50%;

background:rgba(0,0,0,.6);
color:white;

font-size:28px;

cursor:pointer;

border:1px solid var(--cyan);

box-shadow:0 0 15px var(--cyan);

z-index:999;

}

#topBtn{

position:fixed;
right:20px;
bottom:20px;

width:55px;
height:55px;

border:none;
border-radius:50%;

background:var(--cyan);
color:black;

font-size:24px;
font-weight:bold;

cursor:pointer;

display:none;

z-index:999;

}

footer{

margin-top:60px;
padding:30px;

text-align:center;

border-top:1px solid rgba(255,0,60,.3);

color:#888;

}

@media(max-width:768px){

.hero h2{
font-size:1.8rem;
}

h1{
font-size:1.5rem;
}

}

</style>

<!-- ================= FOOTER ================= -->

<footer>

© 2026 CyrusLinksHub Movies Hub

</footer>

<!-- ================= TOP BUTTON ================= -->

<button id="topBtn">

↑

</button>

<script>

/* SETTINGS */

function openSettings(){

document
.getElementById("settingsModal")
.style.display="flex";

}

function closeSettings(){

document
.getElementById("settingsModal")
.style.display="none";

}

/* MENU BUTTON */

document
.getElementById("menuBtn")
.addEventListener("click",()=>{

document
.getElementById("settingsModal")
.style.display="flex";

});

/* TOP BUTTON */

const topBtn =
document.getElementById("topBtn");

window.addEventListener(
"scroll",
()=>{

topBtn.style.display =
window.scrollY > 250
? "block"
: "none";

}
);

topBtn.onclick=()=>{

window.scrollTo({

top:0,
behavior:"smooth"

});

};

/* PARTICLES */

const canvas =
document.getElementById(
"particles"
);

const ctx =
canvas.getContext("2d");

let w,h;

function resize(){

w=canvas.width=
window.innerWidth;

h=canvas.height=
window.innerHeight;

}

resize();

window.addEventListener(
"resize",
resize
);

const particles=[];

function createParticle(x,y){

return{

x:x,
y:y,

vx:(Math.random()-0.5)*2,
vy:(Math.random()-0.5)*2,

size:Math.random()*3+1,

life:100,

color:
Math.random()>.5
? "#00f7ff"
: "#ff003c"

};

}

/* AMBIENT PARTICLES */

for(let i=0;i<70;i++){

particles.push({

x:Math.random()*w,
y:Math.random()*h,

vx:(Math.random()-0.5)*0.4,
vy:(Math.random()-0.5)*0.4,

size:Math.random()*3+1,

ambient:true,

color:
Math.random()>.5
? "#00f7ff"
: "#ff003c"

});

}

/* TOUCH + MOUSE BURST */

function spawnBurst(x,y){

for(let i=0;i<6;i++){

particles.push(
createParticle(x,y)
);

}

}

window.addEventListener(
"mousemove",
e=>{

spawnBurst(
e.clientX,
e.clientY
);

}
);

window.addEventListener(
"touchmove",
e=>{

const t=e.touches[0];

spawnBurst(
t.clientX,
t.clientY
);

},
{passive:true}
);

/* ANIMATION */

function animate(){

ctx.clearRect(0,0,w,h);

for(
let i=particles.length-1;
i>=0;
i--
){

const p=particles[i];

p.x+=p.vx;
p.y+=p.vy;

if(p.ambient){

if(p.x<0)p.x=w;
if(p.x>w)p.x=0;

if(p.y<0)p.y=h;
if(p.y>h)p.y=0;

}else{

p.life--;

if(p.life<=0){

particles.splice(i,1);
continue;

}

}

ctx.beginPath();

ctx.fillStyle=p.color;

ctx.arc(
p.x,
p.y,
p.size,
0,
Math.PI*2
);

ctx.fill();

}

requestAnimationFrame(
animate
);

}

animate();

</script>

</body>
</html>
