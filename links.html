<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secret Links - Cyrus</title>
    <style>
        :root {
            --bg-color: #0b0f19;
            --card-bg: rgba(255, 255, 255, 0.03);
            --card-border: rgba(255, 255, 255, 0.08);
            --text-primary: #ffffff;
            --text-secondary: #94a3b8;
            --accent-color: #0070f3; /* Vercel Blue */
            --secret-accent: #8b5cf6; /* Purple accent for "Secret" theme */
            --hover-bg: rgba(255, 255, 255, 0.07);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }

        body {
            background-color: var(--bg-color);
            color: var(--text-primary);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            text-align: center;
            padding: 40px 20px;
        }

        /* Navigation Button */
        .back-btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            color: var(--text-secondary);
            text-decoration: none;
            font-size: 0.9rem;
            margin-bottom: 32px;
            padding: 8px 16px;
            border-radius: 20px;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            transition: all 0.2s ease;
        }

        .back-btn:hover {
            color: var(--text-primary);
            border-color: var(--text-secondary);
            transform: translateX(-4px);
        }

        /* Secret Header Section */
        .secret-header {
            margin-bottom: 32px;
        }

        .secret-icon {
            font-size: 2.5rem;
            margin-bottom: 12px;
            display: inline-block;
            animation: float 3s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-8px); }
        }

        .secret-header h1 {
            font-size: 1.6rem;
            font-weight: 700;
            margin-bottom: 8px;
            letter-spacing: -0.025em;
            background: linear-gradient(to right, #ffffff, var(--secret-accent));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        .secret-header p {
            color: var(--text-secondary);
            font-size: 0.95rem;
            line-height: 1.5;
        }

        /* Links Section */
        .links-container {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .link-card {
            display: block;
            background: var(--card-bg);
            border: 1px solid var(--card-border);
            padding: 16px;
            border-radius: 12px;
            color: var(--text-primary);
            text-decoration: none;
            font-size: 1rem;
            font-weight: 500;
            transition: all 0.2s ease-in-out;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .link-card:hover {
            background: var(--hover-bg);
            border-color: var(--secret-accent);
            transform: translateY(-2px);
            box-shadow: 0 4px 20px rgba(139, 92, 246, 0.15);
        }

        /* Footer */
        footer {
            margin-top: 48px;
            font-size: 0.8rem;
            color: var(--text-secondary);
            letter-spacing: 0.05em;
        }
    </style>
</head>
<body>

    <div class="container">
        
        <!-- Back Navigation Button -->
        <a href="/" class="back-btn">
            &larr; Back to Main Hub
        </a>

        <!-- Secret Header -->
        <div class="secret-header">
            <span class="secret-icon">🔒</span>
            <h1>Secret Links</h1>
            <p>Welcome to the private section of my hub. These links are exclusive files, hidden projects, or special updates.</p>
        </div>

        <!-- Secret Links List -->
        <div class="links-container">
            <!-- Replace these placeholder URLs with your actual secret links -->
            <a href="https://your-private-link1.com" target="_blank" rel="noopener noreferrer" class="link-card">
                🤫 Exclusive Project Sneak Peek
            </a>
            
            <a href="https://your-private-link2.com" target="_blank" rel="noopener noreferrer" class="link-card">
                📁 Download My Media Kit / Assets
            </a>
            
            <a href="https://your-private-link3.com" target="_blank" rel="noopener noreferrer" class="link-card">
                ✨ Special Community Invite
            </a>
        </div>

        <!-- Footer -->
        <footer>
            &copy; 2026 CYRUS. PRIVATE ZONE.
        </footer>
    </div>

</body>
</html>
