<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Security Verification</title>

    <script src="https://challenges.cloudflare.com/turnstile/v0/api.js" async defer></script>

    <style>
        body{
            margin:0;
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
            background:#0f172a;
            color:white;
            font-family:Arial,sans-serif;
        }

        .box{
            background:#1e293b;
            padding:30px;
            border-radius:15px;
            text-align:center;
            width:350px;
            box-shadow:0 0 20px rgba(0,0,0,0.3);
        }

        h2{
            margin-bottom:10px;
        }

        p{
            color:#cbd5e1;
        }

        button{
            margin-top:20px;
            padding:12px 20px;
            border:none;
            border-radius:8px;
            background:#2563eb;
            color:white;
            cursor:pointer;
            font-size:16px;
        }

        button:disabled{
            background:gray;
            cursor:not-allowed;
        }
    </style>
</head>
<body>

<div class="box">
    <h2>Security Verification</h2>
    <p>Please complete the verification below.</p>

    <div class="cf-turnstile"
     data-sitekey="0x4AAAAAADpO26nXkPrhIK8TRHNSevONhOg">
    </div>
    </div>

    <button id="continueBtn" disabled>
        Continue
    </button>
</div>

<script>
let verifiedUser = false;

function verified(token){
    verifiedUser = true;
    document.getElementById("continueBtn").disabled = false;
}

document.getElementById("continueBtn").addEventListener("click", () => {

    localStorage.setItem(
        "verified_until",
        Date.now() + (5 * 60 * 1000)
    );

    window.location.href = "index.html";
});
</script>

</body>
</html>
