<!DOCTYPE html><html><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>Cyrus Links Hub</title><style>*{margin:0;padding:0;box-sizing:border-box;font-family:Arial,sans-serif}body{background:#050816;color:#fff;transition:.4s;overflow-x:hidden}body.light{background:#f4f4f4;color:#111}#loader{position:fixed;inset:0;background:#000;display:flex;justify-content:center;align-items:center;font-size:2rem;z-index:9999;color:#0ff}header{text-align:center;padding:20px}h1{text-shadow:0 0 20px #0ff}.stars{position:fixed;inset:0;z-index:-1;background:radial-gradient(circle,#00ffff33 2px,transparent 2px);background-size:40px 40px;animation:move 10s linear infinite}@keyframes move{to{transform:translate(40px,40px)}}input{padding:12px;width:80%;max-width:400px;border-radius:20px;border:none;margin:20px}button{padding:10px 20px;border:none;border-radius:20px;background:#0ff;cursor:pointer}.cards{display:grid;grid-template-columns:repeat(auto-fit,minmax(200px,1fr));gap:20px;padding:30px}.card{background:#111827;padding:30px;border-radius:20px;text-align:center;transition:.3s}.card:hover{transform:translateY(-10px);box-shadow:0 0 20px #0ff}@media(max-width:600px){h1{font-size:2rem}}</style></head><body><div id="loader">Loading Cyrus Links Hub...</div><div class="stars"></div><header><h1>🎮 CYRUS LINKS HUB</h1><button onclick="document.body.classList.toggle('light')">🌙 Dark/Light</button><br><input id="search" placeholder="Search..." onkeyup="searchCards()"></header><div class="cards"><div class="card">🎮 Games</div><div class="card">🎬 Movies</div><div class="card">🎵 Music</div><div class="card">📱 Apps</div><div class="card">🔥 Trending</div><div class="card">🚀 More</div></div><script>window.onload=()=>setTimeout(()=>loader.style.display='none',1500);function searchCards(){let q=search.value.toLowerCase();document.querySelectorAll('.card').forEach(c=>c.style.display=c.innerText.toLowerCase().includes(q)?'block':'none')}</script></body></html>
