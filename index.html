<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CyrusLinksHub - Gaming Hub</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Rajdhani:wght@500;700&display=swap" rel="stylesheet">

<style>
/* ================= ROOT VARIABLES ================= */
:root{
    --neon-red:#ff003c;
    --neon-cyan:#00f7ff;
    --bg-dark:#05010a;
    --card-bg:rgba(10,5,20,0.75);
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

html{
    scroll-behavior:smooth;
}

body{
    background:var(--bg-dark);
    color:#fff;
    overflow-x:hidden;
    font-family:'Orbitron',sans-serif;
    line-height:1.6;
}

/* ================= TYPOGRAPHY ================= */
h1,h2,h3{
    letter-spacing:2px;
}

p{
    font-family:'Rajdhani',sans-serif;
    font-size:1.1rem;
    color:#ccc;
}

/* ================= PARTICLE CANVAS ================= */
canvas{
    position:fixed;
    inset:0;
    z-index:-1;
    pointer-events:none;
}

/* ================= SETTINGS MODAL ================= */
.modal-overlay{
    position:fixed;
    inset:0;
    display:none;
    justify-content:center;
    align-items:center;
    background:rgba(5,1,10,0.85);
    backdrop-filter:blur(8px);
    z-index:9999;
}

.modal-content{
    width:90%;
    max-width:400px;
    padding:30px;
    border-radius:10px;
    text-align:center;
    background:#0d0614;
    border:2px solid var(--neon-cyan);
    box-shadow:0 0 25px rgba(0,247,255,.5);
}

.modal-content h3{
    color:var(--neon-cyan);
    margin-bottom:25px;
}

.setting-row{
    display:flex;
    justify-content:space-between;
    align-items:center;
    margin:18px 0;
    font-family:'Rajdhani',sans-serif;
    font-size:1.2rem;
}

.close-modal-btn{
    margin-top:25px;
    padding:10px 24px;
    background:transparent;
    color:var(--neon-red);
    border:1px solid var(--neon-red);
    border-radius:5px;
    cursor:pointer;
    transition:.3s;
}

.close-modal-btn:hover{
    background:var(--neon-red);
    color:#000;
    box-shadow:0 0 15px var(--neon-red);
}

/* ================= SWITCH ================= */
.switch{
    position:relative;
    display:inline-block;
    width:45px;
    height:22px;
}

.switch input{
    opacity:0;
    width:0;
    height:0;
}

.slider{
    position:absolute;
    inset:0;
    cursor:pointer;
    border-radius:22px;
    background:#333;
    border:1px solid #555;
    transition:.4s;
}

.slider:before{
    content:"";
    position:absolute;
    width:14px;
    height:14px;
    left:3px;
    bottom:3px;
    border-radius:50%;
    background:#fff;
    transition:.4s;
}

input:checked + .slider{
    background:var(--neon-cyan);
}

input:checked + .slider:before{
    transform:translateX(23px);
}

/* ================= HEADER ================= */
header{
    text-align:center;
    padding:20px;
    border-bottom:2px solid var(--neon-red);
    background:rgba(5,1,10,.95);
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px rgba(255,0,60,.4);
}

.title-row{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    position:relative;
    max-width:700px;
    margin:auto;
}

.title-link{
    text-decoration:none;
    display:flex;
    align-items:center;
    gap:15px;
    color:inherit;
}
  /* ================= LOGO ================= */
header h1{
    color:var(--neon-red);
    font-size:2rem;
    text-shadow:0 0 15px var(--neon-red);
}

.logo-container{
    width:42px;
    height:42px;
    border-radius:50%;
    display:flex;
    justify-content:center;
    align-items:center;
    border:2px solid var(--neon-cyan);
    box-shadow:0 0 12px var(--neon-cyan);
    animation:logoRotate 8s linear infinite;
}

.logo-tick{
    width:22px;
    height:22px;
    fill:none;
    stroke:var(--neon-cyan);
    stroke-width:4;
    stroke-linecap:round;
    stroke-linejoin:round;
}

@keyframes logoRotate{
    from{
        transform:rotate(0deg);
    }

    to{
        transform:rotate(360deg);
    }
}

/* ================= SETTINGS BUTTON ================= */
.settings-btn{
    position:absolute;
    right:0;
    width:36px;
    height:36px;
    border-radius:5px;
    border:1px solid var(--neon-cyan);
    background:transparent;
    color:var(--neon-cyan);
    cursor:pointer;
    transition:.3s;
}

.settings-btn:hover{
    background:var(--neon-cyan);
    color:#000;
    transform:rotate(45deg);
}

/* ================= HERO ================= */
.hero{
    text-align:center;
    padding:70px 20px;
    background:
    radial-gradient(
        circle,
        rgba(255,0,60,.12) 0%,
        transparent 70%
    );
}

.hero h2{
    color:var(--neon-red);
    font-size:2.5rem;
    text-shadow:0 0 20px rgba(255,0,60,.7);
}

.hero p{
    margin-top:15px;
    font-size:1.2rem;
}

/* ================= SECTIONS ================= */
section{
    max-width:1200px;
    margin:auto;
    padding:50px 20px;
}

.section-header{
    margin-bottom:25px;
}

.section-title{
    color:var(--neon-cyan);
    text-shadow:0 0 10px rgba(0,247,255,.5);
    font-size:1.8rem;
    text-transform:uppercase;
}

.section-header::before{
    content:"";
    display:block;
    width:100%;
    max-width:220px;
    height:2px;
    margin-top:10px;
    background:linear-gradient(
        90deg,
        var(--neon-cyan),
        transparent
    );
}

.desc{
    margin-bottom:35px;
    max-width:850px;
}

/* ================= GAME CARDS ================= */
.games-grid{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    border-radius:10px;
    overflow:hidden;
    border:1px solid var(--neon-cyan);
    background:var(--card-bg);
    box-shadow:0 0 12px rgba(0,247,255,.25);
    transition:.35s;
}

.card:hover{
    transform:translateY(-5px);
    border-color:var(--neon-red);
    box-shadow:0 8px 25px rgba(255,0,60,.35);
}

.card-content{
    padding:35px 25px;
    text-align:center;
}

.card-title{
    font-size:1.4rem;
    margin-bottom:25px;
}

/* ================= BUTTONS ================= */
.btn{
    display:block;
    width:100%;
    padding:12px;
    border-radius:5px;
    text-decoration:none;
    text-align:center;
    color:var(--neon-red);
    border:1px solid var(--neon-red);
    transition:.3s;
    text-transform:uppercase;
    letter-spacing:1px;
}

.btn:hover{
    background:var(--neon-red);
    color:#000;
    box-shadow:0 0 15px var(--neon-red);
}
  /* ================= FAQ ================= */
.faq-block{
    background:rgba(255,255,255,.03);
    border-left:3px solid var(--neon-cyan);
    padding:15px 20px;
    margin-bottom:15px;
    border-radius:0 8px 8px 0;
}

.faq-question{
    color:var(--neon-cyan);
    font-weight:600;
    margin-bottom:6px;
}

.faq-answer{
    color:#aaa;
    font-family:'Rajdhani',sans-serif;
}

/* ================= FOOTER ================= */
.footer-links{
    display:grid;
    grid-template-columns:
    repeat(auto-fit,minmax(220px,1fr));
    gap:30px;
    max-width:1200px;
    margin:40px auto 0;
    padding:40px 20px;
    background:rgba(5,1,10,.8);
    border-top:1px solid rgba(0,247,255,.2);
}

.footer-links h3{
    color:var(--neon-cyan);
    margin-bottom:15px;
}

.footer-links a{
    display:block;
    color:#aaa;
    text-decoration:none;
    margin:10px 0;
    transition:.3s;
}

.footer-links a:hover{
    color:var(--neon-red);
    padding-left:5px;
}

footer{
    text-align:center;
    padding:30px 20px;
    background:#020005;
    color:#888;
    border-top:1px solid rgba(255,0,60,.2);
}

/* ================= BACK TO TOP ================= */
#topBtn{
    position:fixed;
    right:25px;
    bottom:25px;
    width:45px;
    height:45px;
    border:none;
    border-radius:5px;
    cursor:pointer;
    display:none;
    background:rgba(5,1,10,.9);
    color:var(--neon-cyan);
    border:1px solid var(--neon-cyan);
    transition:.3s;
    z-index:1000;
}

#topBtn:hover{
    background:var(--neon-cyan);
    color:#000;
    box-shadow:0 0 15px var(--neon-cyan);
}

/* ================= MOBILE ================= */
@media(max-width:768px){

    header h1{
        font-size:1.6rem;
    }

    .hero h2{
        font-size:1.9rem;
    }

    section{
        padding:40px 15px;
    }

    .card-content{
        padding:25px 20px;
    }

    .footer-links{
        text-align:center;
    }

    .settings-btn{
        position:static;
    }

    .title-row{
        flex-direction:column;
    }

    .games-grid{
        grid-template-columns:1fr;
    }
}

</style>
</head>

<body>

<canvas id="particles"></canvas>

<!-- SETTINGS MODAL -->
<div class="modal-overlay" id="settingsModal">

    <div class="modal-content">

        <h3>SYSTEM SETTINGS</h3>

        <div class="setting-row">

            <span>Ambient Particles</span>

            <label class="switch">

                <input type="checkbox"
                       id="particleToggle"
                       checked>

                <span class="slider"></span>

            </label>

        </div>

        <div class="setting-row">

            <span>Performance Mode</span>

            <label class="switch">

                <input type="checkbox"
                       id="performanceToggle">

                <span class="slider"></span>

            </label>

        </div>

        <button class="close-modal-btn"
                onclick="closeSettings()">

            CLOSE

        </button>

    </div>

</div>
